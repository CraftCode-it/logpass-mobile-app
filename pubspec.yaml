  auto_size_text: ^3.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  uuid: ^4.2.2
  connectivity_plus: ^5.0.2
  app_settings: ^5.1.1
  cryptography: ^2.7.0
  pdfx: '>=2.7.0 <2.9.0'
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3
  logpass_crypto:
    path: ./logpass_crypto

dev_dependencies:
  flutter_test:
    sdk: flutter
  auto_route_generator: ^7.3.2
  build_runner: ^2.4.7
  freezed: ^2.4.6
  retrofit_generator: ^8.1.0
  injectable_generator: ^2.4.1
  json_serializable: ^6.7.1
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  bloc_test: ^9.1.5
  flutter_launcher_icons: ^0.13.1
  hive_generator: ^2.0.1

dependency_overrides:
  # watcher 1.0.0 uses FileSystemEvent which became sealed in Dart 3.x
  watcher: ^1.1.0
  # pub_semver 2.1.0 uses FallThroughError removed in Dart 3.x
  pub_semver: ^2.1.4
  # platform 3.0.2 uses Platform.packageRoot removed in Dart 3.x
  platform: ^3.1.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter.
flutter:
  uses-material-design: true

  assets:
    - assets/translations/
    - assets/json/
    - assets/icon/
    - assets/image/
    - assets/fonts/
    - assets/documents/
    - assets/flags/
    - assets/launcher/
    - assets/cert/

