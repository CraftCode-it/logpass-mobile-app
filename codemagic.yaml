workflows:
  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: logpass-app-store-connect
    environment:
      flutter: 3.24.5
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: me.logpass.app
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Generate Dart code
        script: |
          dart run easy_localization:generate --source-dir ./assets/translations -f keys -o local_keys.g.dart
          dart run build_runner build --delete-conflicting-outputs
      - name: Patch iOS plugin compatibility
        script: |
          python3 - <<'PY'
          from pathlib import Path

          libphonenumber_files = list(Path.home().glob(".pub-cache/hosted/pub.dev/libphonenumber-*/ios/Classes/LibphonenumberPlugin.m"))
          if not libphonenumber_files:
              raise SystemExit("LibphonenumberPlugin.m not found in pub cache")

          plugin_file = libphonenumber_files[0]
          source = plugin_file.read_text()
          patched = source.replace("[[NBPhoneNumberUtil alloc] sharedInstance]", "[NBPhoneNumberUtil sharedInstance]")
          patched = patched.replace("[[NBPhoneNumberUtil alloc] init]", "[NBPhoneNumberUtil sharedInstance]")

          if patched == source:
              print(f"No libphonenumber patch needed for {plugin_file}")
          else:
              plugin_file.write_text(patched)
              print(f"Patched {plugin_file}")

          firebase_patches = [
              (".pub-cache/hosted/pub.dev/firebase_crashlytics-*/ios/Classes/*.[hm]", "@import FirebaseCrashlytics;"),
              (".pub-cache/hosted/pub.dev/firebase_messaging-*/ios/Classes/*.[hm]", "@import FirebaseMessaging;"),
          ]

          for pattern, module_import in firebase_patches:
              for source_file in Path.home().glob(pattern):
                  source = source_file.read_text()
                  patched = source.replace("#import <Firebase/Firebase.h>", module_import)
                  if patched != source:
                      source_file.write_text(patched)
                      print(f"Patched Firebase import in {source_file}")
          PY
      - name: Initialize keychain
        script: keychain initialize
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up iOS code signing
        script: xcode-project use-profiles
      - name: Install iOS pods
        script: |
          cd ios
          pod repo update
          pod install --repo-update
      - name: Build iOS IPA
        script: |
          cd ios
          pod repo update
          cd ..
          flutter build ipa --flavor prod --release -t lib/main_prod.dart --build-name=1.0.0 --build-number=${BUILD_NUMBER:-2} --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
