workflows:
  ios-testflight:
    name: iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: logpass-app-store-connect
    environment:
      flutter: 3.24.5
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: me.logpass.app
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Initialize keychain
        script: keychain initialize
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Set up iOS code signing
        script: xcode-project use-profiles
      - name: Install iOS pods
        script: |
          cd ios
          pod install --repo-update
      - name: Build iOS IPA
        script: flutter build ipa --flavor prod --release -t lib/main_prod.dart --build-name=1.0.0 --build-number=1 --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
